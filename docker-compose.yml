services:
  postgres:
    image: postgres:16-alpine
    container_name: login-service-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-login_service}
      POSTGRES_USER: ${POSTGRES_USER:-login_service}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-login_service}
    volumes:
      - ./postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-login_service} -d ${POSTGRES_DB:-login_service}"]
      interval: 5s
      timeout: 5s
      retries: 10

  login-service:
    build: .
    container_name: login-service-dashdesign
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "8080:8080"
    env_file:
      - .env
    environment:
      - PORT=8080
      - POSTGRES_HOST=postgres
      - POSTGRES_PORT=5432
      - POSTGRES_DB=${POSTGRES_DB:-login_service}
      - POSTGRES_USER=${POSTGRES_USER:-login_service}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-login_service}
